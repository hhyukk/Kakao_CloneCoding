<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="./css/style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>More - Kokoa Clone</title>
  </head>

  <body>
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <i class="fa-solid fa-wifi"></i>
      </div>
      <div class="status-bar__column">
        <span>18:43</span>
      </div>

      <div class="status-bar__column">
        <span>011%</span>
        <i class="fa-solid fa-battery-full"></i>
        <i class="fa-solid fa-bolt-lightning"></i>
      </div>
    </div>

    <header class="screen-header">
      <h1 class="screen-header__title">More</h1>
      <div class="screen-header__icons">
        <span><i class="fa-solid fa-magnifying-glass fa-lg"></i></span>
        <span><i class="fa-solid fa-music fa-lg"></i></span>
        <span class="dot_relative">
          <a href="settings.html"><i class="fa-solid fa-gear fa-lg"> </i></a>
          <span class="dot"></span>
        </span>
      </div>
    </header>

    <main class="main-screen more-screen">
      <div class="user-component">
        <div class="user-component__column">
          <img id="my-profile-img" src="./image/a.jpg" class="user-component__avatar user-component__avatar--xl" />
          <div class="user-component__text">
            <h4 id="my-profile-name" class="user-component__title">Loading...</h4>
            <h6 id="my-profile-status" class="user-component__subtitle">+82 1234-5678</h6>
            <i class="fa-solid fa-circle-exclamation"></i>
          </div>
        </div>
        <div class="user-component__column">
          <i class="fa-regular fa-message fa-2x"></i>
        </div>
      </div>
      <div class="icon-row">
        <div class="icon-row__icon">
          <i class="fa-regular fa-calendar"></i>
          <span>Calendar</span>
        </div>
        <div class="icon-row__icon">
          <i class="fa-regular fa-hard-drive"></i>
          <span>Talk Drive</span>
        </div>
        <div class="icon-row__icon">
          <i class="fa-regular fa-face-smile-beam"></i>
          <span>Emoticons</span>
        </div>
        <div class="icon-row__icon">
          <i class="fa-solid fa-paint-roller"></i>
          <span>Themes</span>
        </div>
        <div class="icon-row__icon">
          <i class="fa-solid fa-file-invoice-dollar"></i>
          <span>Account</span>
        </div>

        <div class="icon-row__icon">
          <i class="fa-regular fa-comments"></i>
          <span>Openchat</span>
        </div>
      </div>
      <div class="more-suggestions">
        <h4 class="more-suggestions__title">Suggestions</h4>
        <div class="more-suggestions__icons">
          <div class="more-suggestions__icon">
            <div class="more-suggestions__icon-image">
              <i class="fa-solid fa-quote-right"></i>
            </div>
            <span class="more-suggestions__icon-text">Kakao Stroy</span>
          </div>
          <div class="more-suggestions__icon">
            <div class="more-suggestions__icon-image">
              <i class="fa-solid fa-quote-right"></i>
            </div>
            <span class="more-suggestions__icon-text">Kakao Stroy</span>
          </div>
        </div>
      </div>
    </main>

    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__btn">
          <a class="nav__link" href="friends.html">
            <i class="fa-regular fa-user fa-2x"></i>
          </a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="chats.html">
            <span class="nav__notification badge">1</span>
            <i class="fa-regular fa-comment fa-2x"></i
          ></a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="find.html"> <i class="fa-solid fa-magnifying-glass fa-2x"></i></a>
        </li>
        <li class="nav__btn">
          <a class="nav__link" href="more.html">
            <span class="nav__dot"></span>
            <i class="fa-solid fa-ellipsis fa-2x"></i
          ></a>
        </li>
      </ul>
    </nav>
    <!-- fa-solid는 속이 찬, fa-regular는 속이 빈 이모티콘을 말함 -->

    <!-- 프로필 수정 모달 -->
    <div id="profile-edit-modal" class="profile-modal">
      <div class="profile-modal__overlay"></div>
      <div class="profile-modal__content">
        <div class="profile-modal__header">
          <button id="profile-modal-close" class="profile-modal__btn">취소</button>
          <h3>프로필 수정</h3>
          <button id="profile-modal-save" class="profile-modal__btn profile-modal__btn--save">저장</button>
        </div>
        <div class="profile-modal__body">
          <img id="profile-edit-img" src="./image/a.jpg" class="profile-modal__avatar" />
          <div class="profile-modal__field">
            <label>프로필 이미지</label>
            <input id="profile-edit-image" type="file" accept="image/*" />
          </div>
          <div class="profile-modal__field">
            <label>상태 메시지</label>
            <input id="profile-edit-status" type="text" placeholder="상태 메시지를 입력하세요" />
          </div>
        </div>
      </div>
    </div>

    <div id="no-mobile">
      <span>Your scren is Too big</span>
    </div>

    <script src="https://kit.fontawesome.com/2194726cd1.js" crossorigin="anonymous"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
